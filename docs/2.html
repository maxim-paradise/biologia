<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">Microbiome Isometry</title>
    <style vid="5">
        

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            
            --bg-top: #8bfeba;
            --bg-bottom: #f8f698;
            --base-dark: #2a0a5e;
            --base-dark-alpha: rgba(42, 10, 94, 0.15);
            --accent-green: #00d287;
            --accent-green-dark: #00a86b;
            --accent-pink: #ffa4f0;
            --accent-pink-dark: #e87bcf;
            --ui-white: #ffffff;
            --ui-offwhite: #f3f0f7;
            --shadow-color: rgba(42, 10, 94, 0.9);
            
            
            --font-display: 'Space Grotesk', sans-serif;
            --font-ui: 'Inter', sans-serif;
            
            
            --grid-size: 40px;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: var(--font-ui);
            color: var(--base-dark);
            display: flex;
            flex-direction: column;
        }

        
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 24px;
            height: 24px;
            background: var(--base-dark);
            border-radius: 6px;
            display: grid;
            place-items: center;
        }

        .logo-mark::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
        }

        .system-status {
            display: flex;
            gap: 16px;
        }

        .status-badge {
            background: var(--ui-white);
            border: 2px solid var(--base-dark);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 3px 3px 0px var(--base-dark);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-pink);
            animation: pulse 2s infinite;
        }

        .status-dot.green { background: var(--accent-green); }

        
        .stage-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        
        .isometric-svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 900px;
            filter: drop-shadow(0px 20px 40px rgba(42, 10, 94, 0.1));
        }

        
        .floating-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
        }

        
        .iso-card {
            position: absolute;
            background: var(--ui-white);
            border: 2px solid var(--base-dark);
            border-radius: var(--radius-md);
            padding: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 6px 6px 0px var(--base-dark);
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: float-card 6s ease-in-out infinite;
            width: max-content;
        }

        .iso-card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .card-icon-box {
            width: 40px;
            height: 40px;
            background: var(--base-dark);
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-data {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            min-width: 120px;
        }

        
        .data-line {
            height: 6px;
            border-radius: 3px;
            background: var(--ui-offwhite);
            width: 100%;
        }

        .data-line.pink { background: var(--accent-pink); width: 80%; }
        .data-line.green { background: var(--accent-green); width: 60%; }
        .data-line.dark { background: var(--base-dark); width: 40%; }

        .card-label {
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--base-dark);
            margin-bottom: 2px;
        }

        
        .card-1 { top: 25%; left: 55%; animation-delay: 0s; }
        .card-2 { top: 40%; left: 65%; animation-delay: -2s; }
        .card-3 { top: 60%; left: 15%; animation-delay: -4s; }

        
        .bottom-panel {
            padding: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 100;
        }

        .legend {
            display: flex;
            gap: 24px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            border: 2px solid var(--base-dark);
            box-shadow: 4px 4px 0px var(--base-dark);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .swatch {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid var(--base-dark);
        }

        .swatch.macrophage { background: var(--ui-white); }
        .swatch.virus { background: var(--accent-pink); }
        .swatch.bacteria { background: var(--accent-green); }

        .metrics {
            text-align: right;
            font-family: var(--font-display);
        }

        .metric-value {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 2px 2px 0px var(--ui-white);
        }

        .metric-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(0.8); }
        }

        @keyframes float-card {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        
        .anim-float-fast { animation: float-card 3s ease-in-out infinite; }
        .anim-float-slow { animation: float-card 8s ease-in-out infinite; }
        .anim-pulse-path { animation: stroke-pulse 2s infinite; }

        @keyframes stroke-pulse {
            0% { stroke-opacity: 0.3; }
            50% { stroke-opacity: 1; }
            100% { stroke-opacity: 0.3; }
        }

        
        @media (max-width: 768px) {
            .top-nav { flex-direction: column; gap: 16px; padding: 16px; }
            .bottom-panel { flex-direction: column; gap: 24px; align-items: stretch; padding: 16px; }
            .legend { flex-wrap: wrap; justify-content: center; }
            .metrics { text-align: center; }
            .card-1 { top: 15%; left: 50%; transform: translateX(-50%); }
            .card-2 { top: 75%; left: 50%; transform: translateX(-50%); }
            .card-3 { display: none; }
        }
    </style>
</head>
<body vid="6">
